<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskFlow — A modern task management platform. Register or log in to start organizing your work efficiently.">
  <title>TaskFlow — Login & Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <!-- ── Toast Notification Container ─────────────────────── -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ── Auth Container ───────────────────────────────────── -->
  <div class="auth-wrapper">

    <!-- Branding -->
    <div class="auth-brand">
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="12" fill="#10B981"/>
          <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="auth-title">TaskFlow</h1>
      <p class="auth-subtitle">Organize your work. Achieve your goals.</p>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button id="login-tab" class="auth-tab active" onclick="switchTab('login')">Log In</button>
        <button id="register-tab" class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="login-password" placeholder="Enter your password" required minlength="6" autocomplete="current-password">
          </div>
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          <span class="btn-text">Log In</span>
          <span class="btn-loader hidden">
            <span class="spinner"></span>
          </span>
        </button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="register-name">Full Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="register-name" placeholder="John Doe" required autocomplete="name">
          </div>
        </div>
        <div class="form-group">
          <label for="register-email">Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="register-email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="register-password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
          </div>
        </div>
        <button type="submit" id="register-btn" class="btn btn-primary btn-full">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader hidden">
            <span class="spinner"></span>
          </span>
        </button>
      </form>

    </div>

    <p class="auth-footer">Built with ♥ for productivity</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
